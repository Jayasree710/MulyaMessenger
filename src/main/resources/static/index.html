<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Mulya-Messenger</title>
    <style>
        :root{
          --aubergine:#3F0E40;--aubergine-2:#4A154B;--accent:#611f69;
          --text:#e6e6e6;--muted:#bdbdbd;--bg:#ffffff;--bubble:#f7f7f7;
          --border:#e8e8e8;--green:#2ecc71;
        }
        *{box-sizing:border-box}
        body{margin:0;height:100vh;display:grid;grid-template-columns:280px 1fr;font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg)}
        .sidebar{background:var(--aubergine);color:var(--text);display:flex;flex-direction:column;height:100vh}
        .workspace{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
        .me{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
        .status-dot{width:10px;height:10px;border-radius:50%;background:#888}
        .status-dot.online{background:var(--green)}
        .section{padding:10px 8px 6px;font-size:12px;color:#d8c7d8;text-transform:uppercase}
        .list{padding:0 6px 10px;overflow:auto}
        .item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;cursor:pointer;color:var(--text)}
        .item:hover{background:rgba(255,255,255,.08)}
        .badge{margin-left:auto;font-size:11px;background:#5e2b61;padding:2px 6px;border-radius:999px;color:#fff;min-width:18px;text-align:center}
        .add-btn{margin:8px; padding:8px 10px; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18); border-radius:8px; cursor:pointer; text-align:center; font-weight:600}
        .add-btn:hover{background:rgba(255,255,255,.18)}
        .main{display:grid;grid-template-rows:56px 1fr 70px;height:100vh}
        .header{background:var(--aubergine-2);color:#fff;display:flex;align-items:center;gap:10px;padding:0 16px}
        .conn{margin-left:auto;font-size:13px;opacity:.9}
        .messages{overflow:auto;padding:16px;background:var(--bg)}
        .msg{display:flex;gap:10px;margin:10px 0}
        .avatar{width:36px;height:36px;border-radius:8px;background:#ddd;display:flex;align-items:center;justify-content:center;font-weight:700;color:#444}
        .bubble{background:var(--bubble);border:1px solid var(--border);padding:10px 12px;border-radius:10px;max-width:70%}
        .meta{font-size:11px;color:#666;margin-top:4px}
        .mine{justify-content:flex-end}
        .mine .bubble{background:#eef7ff}
        .composer{border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:10px}
        .composer input{flex:1;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px}
        .composer button{border:none;background:var(--accent);color:#fff;border-radius:10px;padding:10px 14px;font-weight:600;cursor:pointer}
        .composer button:hover{filter:brightness(.95)}
        /* modal */
        .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal{width:min(460px,92vw);background:#fff;border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
        .modal .row{display:flex;gap:10px;margin-top:10px}
        .modal input{flex:1;padding:10px;border:1px solid #ddd;border-radius:10px}
        .modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
        .btn{padding:8px 12px;border-radius:8px;border:1px solid #ddd;background:#f7f7f7;cursor:pointer}
        .btn.primary{background:var(--accent);border:none;color:#fff}
        .item .avatar {width: 24px;height: 24px;border-radius: 6px;background: #ddd;display: flex;align-items: center;justify-content: center;font-size: 12px;font-weight: 600;color: #444;}
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="workspace"><div style="font-weight:700">My Mulya</div><div style="font-size:12px;color:#d8c7d8">Messenger</div></div>
    <div class="me">
        <div id="meDot" class="status-dot"></div>
        <div>
            <div id="meName">You</div>
            <div id="mePresence" style="font-size:12px;color:#d8c7d8">Disconnected</div>
        </div>
    </div>

    <div class="section">Channels</div>
    <div class="list" id="channelList">
        <div class="item" data-id="channel:public" id="item-public">
            <span># general</span>
            <span class="badge" data-badge-for="channel:public" style="display:none">0</span>
        </div>
    </div>

    <!--    <div class="section">Groups</div>-->
    <div class="list" id="groupList"></div>
    <div class="add-btn" id="createChannelBtn">＋ Create Channel</div>

    <div class="section">Direct Messages</div>
    <div class="list" id="dmList"></div>
    <div class="add-btn" id="addPersonBtn">＋ Add Person</div>
</aside>

<main class="main">
    <div class="header">
        <div class="title" id="headerTitle"># general</div>
        <div class="conn" id="connStatus">Disconnected</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer">
        <input id="msgInput" placeholder="Message #general"/>
        <button id="sendBtn">Send</button>
    </div>
</main>

<!-- Add Person Modal -->
<div class="backdrop" id="addModal">
    <div class="modal">
        <h3>Add Person</h3>
        <div style="font-size:13px;color:#666">Enter a username to add to your DM list.</div>
        <div class="row"><input id="newUserInput" placeholder="e.g., Priya"/></div>
        <div class="actions">
            <button class="btn" data-close="#addModal">Cancel</button>
            <button class="btn primary" id="confirmAddUser">Add</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const WS_ENDPOINT="http://192.168.1.120:8081/ws";
    let stompClient=null;
    const currentUser=prompt("Enter your username:")||("User"+Math.floor(Math.random()*900+100));
    document.getElementById("meName").textContent=currentUser;

    let activeConv="channel:public";
    const messagesByConv=new Map();
    const unreadByConv=new Map();
    const dmUsers=new Set();
    const groups=new Map(); // groupId -> group object

    /************ UTILS ************/
    const convIdForDM=(a,b)=>"dm:"+[a,b].sort().join("|");
    const isActive=id=>id===activeConv;
    const fmtTime=ts=>new Date(ts||Date.now()).toLocaleString();
    function incUnread(id){if(isActive(id))return; unreadByConv.set(id,(unreadByConv.get(id)||0)+1); updateBadges();}
    function clearUnread(id){unreadByConv.delete(id); updateBadges();}
    function updateBadges(){
      const cb=document.querySelector('[data-badge-for="channel:public"]'); const cval=unreadByConv.get("channel:public")||0; cb.style.display=cval>0?"inline-block":"none"; cb.textContent=cval;
      dmUsers.forEach(u=>{
          const id=convIdForDM(currentUser,u); const badge=document.querySelector(`[data-badge-for="${CSS.escape(id)}"]`); if(!badge) return; const val=unreadByConv.get(id)||0; badge.style.display=val>0?"inline-block":"none"; badge.textContent=val;
      });
      groups.forEach((g,id)=>{
          const badge=document.querySelector(`[data-badge-for="group:${id}"]`); if(!badge) return; const val=unreadByConv.get("group:"+id)||0; badge.style.display=val>0?"inline-block":"none"; badge.textContent=val;
      });
    }

    /************ STOMP CONNECT ************/
    function setConn(ok){
      document.getElementById("connStatus").textContent=ok?"Connected":"Disconnected";
      document.getElementById("mePresence").textContent=ok?"Online":"Disconnected";
      document.getElementById("meDot").classList.toggle("online",ok);
    }

    function connect(){
      const socket=new SockJS(WS_ENDPOINT);
      stompClient=Stomp.over(socket);
      stompClient.debug=null;

      stompClient.connect({userName:currentUser}, frame=>{
          setConn(true);

          // Public channel
          stompClient.subscribe("/topic/public", frameMsg=>{
              const msg=JSON.parse(frameMsg.body);
              appendMessage("channel:public", msg);
              if(!isActive("channel:public")) incUnread("channel:public");
          });

          // Private inbox
          stompClient.subscribe(`/queue/private/${currentUser}`, frameMsg=>{
              const msg=JSON.parse(frameMsg.body);
              const peer=(msg.sender===currentUser)?msg.recipient:msg.sender;
              ensureDMUser(peer);
              const convId=convIdForDM(currentUser,peer);
              appendMessage(convId,msg);
              if(!isActive(convId)) incUnread(convId);
          });

          // Group messages
          stompClient.subscribe(`/topic/group/*`, frameMsg=>{
              const msg=JSON.parse(frameMsg.body);
              const convId="group:"+msg.groupId;
              if(!groups.has(msg.groupId)) return;
              appendMessage(convId,msg);
              if(!isActive(convId)) incUnread(convId);
          });

      }, err=>{
          setConn(false);
          setTimeout(connect,2000);
      });
    }

    /************ MESSAGE HANDLING ************/
    function appendMessage(convId,msg){
      if(!messagesByConv.has(convId)) messagesByConv.set(convId,[]);
      messagesByConv.get(convId).push({
          sender: msg.sender,
          content: msg.content,
          type: msg.type,
          recipient: msg.recipient,
          ts: msg.timeStamp || Date.now()
      });
      if(isActive(convId)) renderMessages(convId);
    }

    function renderMessages(convId){
      const root=document.getElementById("messages"); root.innerHTML="";
      const list=messagesByConv.get(convId)||[];
      list.forEach(m=>{
          const mine=m.sender===currentUser;
          const row=document.createElement("div");
          row.className="msg"+(mine?" mine":"");
          const initials=(m.sender||"?").slice(0,2).toUpperCase();
          row.innerHTML=`<div class="avatar">${initials}</div><div><div class="bubble">${escapeHtml(m.content)}</div><div class="meta">${m.sender} • ${fmtTime(m.ts)}${m.type==='PRIVATE_MESSAGE'?' • Private':''}</div></div>`;
          root.appendChild(row);
      });
      root.scrollTop=root.scrollHeight;
    }

    function escapeHtml(s){const div=document.createElement("div"); div.textContent=s; return div.innerHTML;}

    /************ SEND MESSAGE ************/
    function sendMessage(){
      const input=document.getElementById("msgInput"); const text=input.value.trim();
      if(!text || !stompClient) return;

      if(activeConv==="channel:public"){
          stompClient.send("/app/chat.sendMessage",{},JSON.stringify({sender:currentUser,content:text,type:"CHAT"}));
      } else if(activeConv.startsWith("dm:")){
          const peer=activeConv.replace("dm:","").split("|").find(u=>u!==currentUser);
          if(!peer){ alert("Select valid DM"); return; }
          stompClient.send("/app/chat.setPrivateMessage",{},JSON.stringify({sender:currentUser,recipient:peer,content:text,type:"PRIVATE_MESSAGE"}));
      } else if(activeConv.startsWith("group:")){
          const groupId=activeConv.replace("group:","");
          stompClient.send("/app/chat.sendGroupMessage",{},JSON.stringify({sender:currentUser,groupId:groupId,content:text,type:"GROUP_MESSAGE"}));
      }
      input.value="";
    }

    /************ UI: NAV ************/
    document.getElementById("item-public").onclick=()=>openConversation("channel:public","# general");

    function ensureDMUser(name){
      if(name===currentUser || dmUsers.has(name)) return;
      dmUsers.add(name);
      const dmRoot=document.getElementById("dmList");
      const id=convIdForDM(currentUser,name);
      const row=document.createElement("div"); row.className="item"; row.dataset.id=id;
      const initials=name.slice(0,2).toUpperCase();
      row.innerHTML=`<div class="avatar">${initials}</div><span>${name}</span><span class="badge" data-badge-for="${id}" style="display:none">0</span>`;
      row.onclick=()=>openConversation(id,name);
      dmRoot.appendChild(row);
    }

    function openConversation(convId,title){activeConv=convId; document.getElementById("headerTitle").textContent=title; document.getElementById("msgInput").placeholder="Message "+title; clearUnread(convId); renderMessages(convId);}

    /************ MODAL: ADD DM ************/
    const addModal=document.getElementById("addModal");
    document.getElementById("addPersonBtn").onclick=()=>openModal(addModal);
    document.getElementById("confirmAddUser").onclick=()=>{
      const name=document.getElementById("newUserInput").value.trim();
      if(!name){ alert("Enter username"); return; }
      if(name===currentUser){ alert("You can't add yourself"); return; }
      if(dmUsers.has(name)){ alert("Already in list"); return; }
      ensureDMUser(name);
      document.getElementById("newUserInput").value="";
      closeModal(addModal);
    };
    document.querySelectorAll('[data-close]').forEach(btn=>btn.onclick=e=>closeModal(document.querySelector(e.currentTarget.getAttribute('data-close'))));
    function openModal(el){el.style.display='flex';} function closeModal(el){el.style.display='none';}

    /************ GROUP HANDLING ************/
   function addChannelRow(group) {
  groups.set(group.id, group);
  const root = document.getElementById("groupList");

  const row = document.createElement("div");
  row.className = "item";
  row.dataset.id = "group:" + group.id;

  row.innerHTML = `
    <div class="avatar">${group.name.slice(0,2).toUpperCase()}</div>
    <span>${group.name}</span>
    <span class="badge" data-badge-for="group:${group.id}" style="display:none">0</span>
  `;

  row.onclick = () => openConversation("group:" + group.id, group.name);
  row.oncontextmenu = (e) => {
    e.preventDefault();
    manageChannel(group.id);
  };

  root.appendChild(row);
}

    document.getElementById("createChannelBtn").onclick = () => {
  const name = prompt("Enter channel name:");
  if (!name) return;

  const membersInput = prompt("Enter members (comma separated usernames):");
  const members = membersInput ? membersInput.split(",").map(s => s.trim()) : [];

  const newChannel = { id: Date.now().toString(), name, members };

  // Optionally send to server if you have backend
  // fetch("/channels", { method:"POST", body: JSON.stringify(newChannel), headers:{"Content-Type":"application/json"}})
  //   .then(res => res.json()).then(channel => addChannelRow(channel))

  addChannelRow(newChannel);
};
    /************Manage Channel ************/

    function manageChannel(groupId) {
  const group = groups.get(groupId);
  if (!group) return;

  const action = prompt(`Manage ${group.name}\nType "add" to add member, "remove" to remove member, "list" to see members:`);
  if (action === "add") {
    const newMember = prompt("Enter username to add:");
    if (newMember && !group.members.includes(newMember)) {
      group.members.push(newMember);
      alert(`${newMember} added to ${group.name}`);
    }
  } else if (action === "remove") {
    const removeMember = prompt("Enter username to remove:");
    group.members = group.members.filter(m => m !== removeMember);
    alert(`${removeMember} removed from ${group.name}`);
  } else if (action === "list") {
    alert(`Members of ${group.name}: ${group.members.join(", ") || "No members yet"}`);
  }
}


    /************ SEND HOOKS ************/
    document.getElementById("sendBtn").addEventListener("click",sendMessage);
    document.getElementById("msgInput").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});

    /************ INIT ************/
    openConversation("channel:public","# general");
    connect();
</script>
</body>
</html>
